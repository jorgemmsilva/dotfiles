###############################
# Plugins
###############################

set -g @plugin 'catppuccin/tmux#d2d25bd3393fe43f19eb4fff6cdd2bdf5578e622'

set -g @plugin 'tmux-plugins/tmux-yank#acfd36e4fcba99f8310a7dfb432111c242fe7392' # yank to system clipboard
set -g @plugin 'tmux-plugins/tmux-cpu#bcb110d754ab2417de824c464730c412a3eb2769' # show cpu usage

# neat icons on windows
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name#0af812a228e1b9f538b8d220c6c59d82d7228973'
set -g automatic-rename on # must be ON for this plugin to work

# persistent sessions
set -g @plugin 'tmux-plugins/tmux-resurrect#cff343cf9e81983d3da0c8562b01616f12e8d548'
set -g @plugin 'tmux-plugins/tmux-continuum#0698e8f4b17d6454c71bf5212895ec055c578da0'
set -g @continuum-restore 'on'

# Smart pane navigation 
# set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'mrjones2014/smart-splits.nvim'

###############################
# Theme
###############################

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_flags 'no'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_window_current_text_color '#{E:@thm_surface_2}'
set -g @catppuccin_date_time_text '%d.%m. %H:%M'
set -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'


# status bar
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -g status-left ""
set -ag status-right "#{E:@catppuccin_status_session}"


# Load catppuccin
run ~/.tmux/plugins/tmux/catppuccin.tmux

###############################
# Keybinds
###############################

# splits
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"


# move through windows
# bind -n C-PPage previous-window
# bind -n C-NPage next-window
bind -n C-S-Left previous-window
bind -n C-S-Right next-window


# session-management
bind-key Tab run-shell "tmux list-sessions -F '##{session_last_attached} ##{session_name}' | sort -rn | cut -d' ' -f2- | grep -xv \"$(tmux display-message -p '##{session_name}')\" | fzf --tmux center,30%,30% --sync --border rounded --border-label ' sessions ' --color='border:#585b70,label:#cdd6f4' | xargs tmux switch-client -t"


# send terminal contents to a pager
bind-key C-f capture-pane -S - \; new-window 'tmux save-buffer - | nvim -'

# Reload TMUX config
bind R source-file ~/.tmux.conf


###############################
# Misc
###############################


# start windows from 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# vim mode
set-window-option -g mode-keys vi

# enable mouse control
set -g mouse on

# don't exit tmux when closing a session
set -g detach-on-destroy off

# don't rename windows automatically
set-option -g allow-rename off

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Upgrade $TERM
# set -g default-terminal 'xterm-256color'
set -g default-terminal 'tmux-256color'

# Focus events enabled for terminals that support them
set -g focus-events on

# said to be "Super useful when using "grouped sessions" and multi-monitor setup"
setw -g aggressive-resize on

# allow keybinds like <C-.> and <C-`> to work inside neovim
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys,clipboard'
set -g set-clipboard on

###############################
# RUN TPM
###############################

# Initialize TMUX plugin manager (keep this line at the end of the file)
run '~/.tmux/plugins/tpm/tpm'
