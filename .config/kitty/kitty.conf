# remove conflict with vim keybinds
map ctrl+shift+h no_op
map ctrl+shift+l no_op

# map ctrl+shift+left no_op
# map ctrl+shift+right no_op

# send C-. and C-` as CSI u sequences (fixes these keys inside tmux)
map ctrl+period send_text all \x1b[46;5u
map ctrl+grave_accent send_text all \x1b[96;5u


allow_remote_control yes


# use ctrl+w to kill splits, disable ctrl+d
map ctrl+w close_window
map ctrl+d no_op


# open new windows/tabs/OS windows in the same working directory
map cmd+enter        new_window_with_cwd
map cmd+t            new_tab_with_cwd

# session management
tab_bar_filter session:~ or session:^$

map F12         launch --type=background --allow-remote-control ~/.config/kitty/session-switcher-wrapper.sh
map ctrl+shift+s     launch --type=overlay --var=skip_save=1 --allow-remote-control ~/.config/kitty/save-session.sh
map ctrl+shift+x     close_session

# send terminal contents to a pager
# scrollback_pager env -u NVIM -u NVIM_LISTEN_ADDRESS NVIM_EPHEMERAL=1 /opt/homebrew/bin/nvim  -c "nnoremap <buffer> q :qa!<CR>" -
scrollback_pager env -u NVIM -u NVIM_LISTEN_ADDRESS NVIM_EPHEMERAL=1 /opt/homebrew/bin/nvim  -
map ctrl+shift+f show_scrollback

# Fonts
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Tab bar
tab_bar_style                powerline
tab_powerline_style          slanted
tab_bar_min_tabs             2
tab_title_template           " {index}: {title} "
active_tab_font_style        bold
inactive_tab_font_style      normal
active_tab_foreground        #1e1e2e
active_tab_background        #cdd6f4
inactive_tab_foreground      #6c7086
inactive_tab_background      #313244
tab_bar_background           #181825


# smart-split 
#
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right

# Unset the mapping to pass the keys to neovim
map --when-focus-on var:IS_NVIM ctrl+j
map --when-focus-on var:IS_NVIM ctrl+k
map --when-focus-on var:IS_NVIM ctrl+h
map --when-focus-on var:IS_NVIM ctrl+l

# the 3 here is the resize amount, adjust as needed
map alt+j kitten relative_resize.py down  3
map alt+k kitten relative_resize.py up    3
map alt+h kitten relative_resize.py left  3
map alt+l kitten relative_resize.py right 3

map --when-focus-on var:IS_NVIM alt+j
map --when-focus-on var:IS_NVIM alt+k
map --when-focus-on var:IS_NVIM alt+h
map --when-focus-on var:IS_NVIM alt+l

allow_remote_control yes
listen_on unix:/tmp/mykitty

## end smart-split
